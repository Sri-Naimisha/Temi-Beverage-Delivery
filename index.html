<!DOCTYPE html>
<html>
<head>
    <title>Temi Beverage Remote</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: linear-gradient(135deg, #a7b3e8, #ac8ace); color: white; height: 100vh; font-family: sans-serif; margin: 0; }
        .card { border-radius: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: none; }
        .btn-custom { width: 200px; height: 70px; font-size: 18px; border-radius: 12px; transition: 0.2s; font-weight: bold; }
        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #status { margin-top: 20px; font-size: 22px; font-weight: 600; min-height: 40px; }
        .text-arrival { color: #5f52e8; text-shadow: 0 0 10px rgba(155, 112, 225, 0.5); }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

    <div class="card p-5 text-center shadow-lg">
        <h1 class="mb-3">Temi Delivery Control</h1>
        <p class="mb-4 text-white-90">Select a location to send the robot</p>

        <div class="d-flex justify-content-center flex-wrap">
            <button class="btn btn-warning btn-custom m-2" onclick="moveTemi('Pantry')">Go to Pantry</button>
            <button class="btn btn-info btn-custom m-2 text-white" onclick="moveTemi('Gaming')">Go to Gaming</button>
        </div>

        <div id="status">Connecting to Firebase...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTOREQwSXlET_OH764k5bbwo4hn_GtvHA",
            authDomain: "temi-beverage-delivery.firebaseapp.com",
            databaseURL: "https://temi-beverage-delivery-default-rtdb.firebaseio.com",
            projectId: "temi-beverage-delivery"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const statusDiv = document.getElementById("status");

        // --- NEW RESET LOGIC ON RELOAD ---
        // This monitors the connection state. When you refresh, Firebase reconnects.
        const connectedRef = ref(database, ".info/connected");
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                console.log("Connected to Firebase. Resetting state...");
                set(ref(database, 'location'), 'none');
                set(ref(database, 'status'), 'idle');
            }
        });
        // ---------------------------------

        // Listen for status changes from Temi
        onValue(ref(database, 'status'), (snapshot) => {
            const status = snapshot.val();
            if (status) {
                const lowerStatus = status.toLowerCase();
                if (lowerStatus.includes("arrived")) {
                    statusDiv.innerHTML = `<span class="text-arrival">${status.toUpperCase()} </span>`;
                } else if (lowerStatus.includes("moving") || lowerStatus.includes("preparing")) {
                    statusDiv.innerHTML = `<span class="badge bg-primary p-2">${status.toUpperCase()}...</span>`;
                } else if (lowerStatus === "idle") {
                    statusDiv.innerHTML = `<span class="text-white-50">SYSTEM READY</span>`;
                } else if (lowerStatus.includes("error") || lowerStatus.includes("blocked")) {
                    statusDiv.innerHTML = `<span class="badge bg-danger p-2">${status.toUpperCase()}</span>`;
                } else {
                    statusDiv.innerHTML = `<span>${status}</span>`;
                }
            }
        });

        // Function to trigger movement
        window.moveTemi = function(locationName) {
            const currentStatus = statusDiv.innerText.toLowerCase();
            
            // Basic UI guard to prevent multiple clicks
            if (currentStatus.includes("moving") || currentStatus.includes("preparing")) {
                alert("Temi is already on the move! Please wait.");
                return;
            }

            statusDiv.innerHTML = `<span class="text-dark">Sending request...</span>`;
            
            // Set the new location in Firebase
            set(ref(database, 'location'), locationName);
        };

    </script>
</body>
</html>
